<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 420" role="img" aria-labelledby="title desc">
  <title id="title">Likelihood and impact risk matrix</title>
  <desc id="desc">A two by two matrix showing risk priority increasing as likelihood and impact rise.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fa}.axis{font:700 18px Arial,sans-serif;fill:#0f1e45}.label{font:700 22px Arial,sans-serif;fill:#0f1e45}.small{font:15px Arial,sans-serif;fill:#495057}.grid{stroke:#fff;stroke-width:5}
    </style>
  </defs>
  <rect class="bg" width="700" height="420" rx="12"/>
  <text class="axis" x="350" y="390" text-anchor="middle">Likelihood</text>
  <text class="axis" x="56" y="215" text-anchor="middle" transform="rotate(-90 56 215)">Impact</text>
  <rect x="132" y="72" width="236" height="126" fill="#f4d35e" class="grid"/>
  <rect x="368" y="72" width="236" height="126" fill="#d9534f" class="grid"/>
  <rect x="132" y="198" width="236" height="126" fill="#8ec63e" class="grid"/>
  <rect x="368" y="198" width="236" height="126" fill="#f0ad4e" class="grid"/>
  <text class="label" x="250" y="133" text-anchor="middle">Watch</text>
  <text class="small" x="250" y="158" text-anchor="middle">high impact</text>
  <text class="label" x="486" y="133" text-anchor="middle">Urgent</text>
  <text class="small" x="486" y="158" text-anchor="middle">treat first</text>
  <text class="label" x="250" y="259" text-anchor="middle">Low</text>
  <text class="small" x="250" y="284" text-anchor="middle">monitor</text>
  <text class="label" x="486" y="259" text-anchor="middle">Manage</text>
  <text class="small" x="486" y="284" text-anchor="middle">reduce likelihood</text>
  <text class="small" x="250" y="348" text-anchor="middle">Low</text>
  <text class="small" x="486" y="348" text-anchor="middle">High</text>
  <text class="small" x="96" y="270" text-anchor="middle">Low</text>
  <text class="small" x="96" y="134" text-anchor="middle">High</text>
</svg>
