<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 250" role="img" aria-labelledby="title desc">
  <title id="title">Carbon credit project lifecycle</title>
  <desc id="desc">A linear flow from project design to validation, verification, credit issuance, and retirement.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#145fa7"/>
    </marker>
    <style>
      .bg{fill:#f5f8fa}.box{fill:#fff;stroke:#145fa7;stroke-width:3}.label{font:700 17px Arial,sans-serif;fill:#0f1e45}.small{font:13px Arial,sans-serif;fill:#495057}.arrow{stroke:#145fa7;stroke-width:4;stroke-linecap:round;marker-end:url(#arrow)}.dot{fill:#8ec63e}
    </style>
  </defs>
  <rect class="bg" width="840" height="250" rx="12"/>
  <g transform="translate(32 70)">
    <rect class="box" width="116" height="82" rx="10"/>
    <text class="label" x="58" y="36" text-anchor="middle">Project</text>
    <text class="label" x="58" y="58" text-anchor="middle">Design</text>
    <circle class="dot" cx="58" cy="98" r="6"/>
    <line class="arrow" x1="124" y1="41" x2="160" y2="41"/>
    <rect class="box" x="168" width="116" height="82" rx="10"/>
    <text class="label" x="226" y="48" text-anchor="middle">Validation</text>
    <circle class="dot" cx="226" cy="98" r="6"/>
    <line class="arrow" x1="292" y1="41" x2="328" y2="41"/>
    <rect class="box" x="336" width="116" height="82" rx="10"/>
    <text class="label" x="394" y="48" text-anchor="middle">Verification</text>
    <circle class="dot" cx="394" cy="98" r="6"/>
    <line class="arrow" x1="460" y1="41" x2="496" y2="41"/>
    <rect class="box" x="504" width="116" height="82" rx="10"/>
    <text class="label" x="562" y="36" text-anchor="middle">Credit</text>
    <text class="label" x="562" y="58" text-anchor="middle">Issuance</text>
    <circle class="dot" cx="562" cy="98" r="6"/>
    <line class="arrow" x1="628" y1="41" x2="664" y2="41"/>
    <rect class="box" x="672" width="116" height="82" rx="10"/>
    <text class="label" x="730" y="48" text-anchor="middle">Retirement</text>
  </g>
  <text class="small" x="420" y="205" text-anchor="middle">Credits should be tracked and retired once used, preventing the same tonne from being claimed twice.</text>
</svg>
