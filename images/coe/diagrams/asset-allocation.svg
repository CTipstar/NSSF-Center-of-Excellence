<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="title desc">
  <title id="title">Illustrative pension asset allocation</title>
  <desc id="desc">A sample allocation across equities, fixed income, real estate, and alternatives for explaining diversification.</desc>
  <defs>
    <style>
      .bg{fill:#f5f8fa}.title{font:700 22px Arial,sans-serif;fill:#0f1e45}.label{font:700 16px Arial,sans-serif;fill:#0f1e45}.small{font:14px Arial,sans-serif;fill:#495057}.axis{stroke:#d9e3ea;stroke-width:2}
    </style>
  </defs>
  <rect class="bg" width="700" height="360" rx="12"/>
  <text class="title" x="350" y="42" text-anchor="middle">Illustrative Diversified Allocation</text>
  <text class="small" x="350" y="67" text-anchor="middle">Not actual NSSF holdings</text>
  <line class="axis" x1="110" y1="278" x2="610" y2="278"/>
  <rect x="140" y="130" width="80" height="148" rx="8" fill="#145fa7"/>
  <rect x="260" y="108" width="80" height="170" rx="8" fill="#8ec63e"/>
  <rect x="380" y="214" width="80" height="64" rx="8" fill="#0f1e45"/>
  <rect x="500" y="236" width="80" height="42" rx="8" fill="#7f8c8d"/>
  <text class="label" x="180" y="118" text-anchor="middle">35%</text>
  <text class="label" x="300" y="96" text-anchor="middle">40%</text>
  <text class="label" x="420" y="202" text-anchor="middle">15%</text>
  <text class="label" x="540" y="224" text-anchor="middle">10%</text>
  <text class="small" x="180" y="308" text-anchor="middle">Equities</text>
  <text class="small" x="300" y="308" text-anchor="middle">Fixed income</text>
  <text class="small" x="420" y="308" text-anchor="middle">Real estate</text>
  <text class="small" x="540" y="308" text-anchor="middle">Alternatives</text>
</svg>
