<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" role="img" aria-labelledby="title desc">
  <title id="title">Strategic management cycle</title>
  <desc id="desc">Four linked stages: Analyze, Formulate, Implement, and Evaluate, looping back to Analyze.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#145fa7"/>
    </marker>
    <style>
      .bg{fill:#f5f8fa}.box{fill:#fff;stroke:#145fa7;stroke-width:3}.accent{fill:#8ec63e}.navy{fill:#0f1e45}.label{font:700 22px Arial,sans-serif;fill:#0f1e45}.small{font:14px Arial,sans-serif;fill:#495057}.arrow{fill:none;stroke:#145fa7;stroke-width:4;stroke-linecap:round;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="700" height="360" rx="12"/>
  <circle cx="350" cy="180" r="58" fill="#e8f2fb" stroke="#8ec63e" stroke-width="4"/>
  <text class="small" x="350" y="173" text-anchor="middle">Strategic</text>
  <text class="small" x="350" y="194" text-anchor="middle">management</text>
  <rect class="box" x="72" y="48" width="190" height="78" rx="10"/>
  <rect class="box" x="438" y="48" width="190" height="78" rx="10"/>
  <rect class="box" x="438" y="234" width="190" height="78" rx="10"/>
  <rect class="box" x="72" y="234" width="190" height="78" rx="10"/>
  <circle class="accent" cx="99" cy="87" r="8"/>
  <circle class="accent" cx="465" cy="87" r="8"/>
  <circle class="accent" cx="465" cy="273" r="8"/>
  <circle class="accent" cx="99" cy="273" r="8"/>
  <text class="label" x="167" y="94" text-anchor="middle">Analyze</text>
  <text class="label" x="533" y="94" text-anchor="middle">Formulate</text>
  <text class="label" x="533" y="280" text-anchor="middle">Implement</text>
  <text class="label" x="167" y="280" text-anchor="middle">Evaluate</text>
  <path class="arrow" d="M 268 87 C 325 54, 374 54, 431 87"/>
  <path class="arrow" d="M 533 132 C 570 164, 570 196, 533 228"/>
  <path class="arrow" d="M 432 273 C 374 307, 326 307, 269 273"/>
  <path class="arrow" d="M 167 228 C 129 196, 129 164, 167 132"/>
</svg>
